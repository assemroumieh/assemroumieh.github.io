<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; }
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow-x: hidden; /* Prevents side-scrolling */
    background-color: #000;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .full-screen-bg {
    /* This is the magic part: it forces the photo to be the background of the WHOLE page */
    background-image: url('download.jpeg');
    background-size: 100% 100%; /* Stretches the photo to hit all four corners */
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed; /* Keeps the photo still while you scroll text */
    min-height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .glass-box {
    background: rgba(0, 0, 0, 0.8); 
    color: white;
    padding: 50px 30px;
    width: 90%;
    max-width: 800px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    backdrop-filter: blur(3px); /* Makes the box feel premium */
  }

  h1 { font-size: 3em; text-transform: uppercase; letter-spacing: 5px; margin: 0; border-bottom: 2px solid white; display: inline-block; padding-bottom: 15px; }
  .subtitle { color: #aaa; margin: 20px 0 40px 0; font-size: 1.1em; letter-spacing: 1px; }

  .btn-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
  .btn { padding: 15px 35px; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 0.9em; letter-spacing: 2px; transition: 0.4s; }
  .btn-cv { background: white; color: black; border: 1px solid white; }
  .btn-li { background: transparent; color: white; border: 1px solid white; }
  .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

  .description { margin-top: 40px; color: #ccc; font-size: 1em; max-width: 600px; margin-left: auto; margin-right: auto; line-height: 1.8; }
  .tag-box { margin-top: 30px; }
  .tag { border: 1px solid #444; padding: 6px 15px; font-size: 0.8em; margin: 5px; display: inline-block; text-transform: uppercase; color: #999; }
</style>
</head>
<body>

<div class="full-screen-bg">
  <div class="glass-box">
    <h1>Assem Roumieh</h1>
    <p class="subtitle">Automotive Engineering @ PoliTo | IT Operations @ Fincantieri S.p.A.</p>
    
    <div class="btn-container">
      <a href="Assem_Roumieh_CV.pdf" class="btn btn-cv">Download CV</a>
      <a href="https://www.linkedin.com/in/assem-roumieh/" class="btn btn-li">LinkedIn</a>
    </div>

    <div class="description">
      <p>Managing digital migration and infrastructure at <b>Fincantieri S.p.A.</b></p>
      <div class="tag-box">
        <span class="tag">Windows 11 Enterprise</span>
        <span class="tag">Maritime Infrastructure</span>
        <span class="tag">Industrial Systems</span>
      </div>
    </div>
  </div>
</div>

<img src="https://profile-counter.glitch.me/assemroumieh/count.svg" alt="Visitor Counter" style="display:none;">

</body>
</html>
