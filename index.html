<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    /* THE ONLY THING THAT MATTERS: */
    background-image: url('download.jpeg');
    background-size: 100% 100%;
    background-attachment: fixed; /* This "glues" the photo to your monitor */
    background-repeat: no-repeat;
    background-color: #000;
    
    font-family: 'Segoe UI', sans-serif;
    color: white;
    scroll-behavior: smooth;
  }

  .section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .glass-card {
    background: rgba(0, 0, 0, 0.9);
    padding: 50px;
    width: 90%;
    max-width: 750px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 50px #000;
  }

  h1 { font-size: 3em; border-bottom: 2px solid white; display: inline-block; padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }
  h2 { color: #ffcc00; text-transform: uppercase; margin-bottom: 30px; }
  
  .btn { display: inline-block; padding: 15px 30px; margin: 10px; text-decoration: none; font-weight: bold; border: 1px solid white; color: white; text-transform: uppercase; }
  .btn-white { background: white; color: black; }

  .exp-box { text-align: left; margin-top: 30px; border-left: 3px solid #ffcc00; padding-left: 20px; }
</style>
</head>
<body>

  <div class="section">
    <div class="glass-card">
      <h1>Assem Roumieh</h1>
      <p>Automotive Engineering @ PoliTo | IT Operations @ Fincantieri S.p.A.</p>
      <div style="margin-top: 30px;">
        <a href="Assem_Roumieh_CV.pdf" class="btn btn-white">Download CV</a>
        <a href="https://www.linkedin.com/in/assem-roumieh/" class="btn">LinkedIn</a>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="glass-card">
      <h2>Technical Experience</h2>
      <div class="exp-box">
        <h3>IT Operations Specialist</h3>
        <p style="color: #ffcc00; font-weight: bold;">Fincantieri S.p.A.</p>
        <p style="color: #aaa;">Digital migration and infrastructure deployment.</p>
      </div>
      <div class="exp-box">
        <h3>Mechanical Engineering</h3>
        <p style="color: #ffcc00; font-weight: bold;">PoliTo</p>
        <p style="color: #aaa;">Technical diagnostics and automotive R&D.</p>
      </div>
    </div>
  </div>

</body>
</html>
