<!DOCTYPE html>
<html>
<head>
<style>
  body, html {
    margin: 0;
    padding: 0;
    background-color: #000; /* Deep black for the sides */
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .main-container {
    position: relative;
    width: 100%;
    max-width: 1000px; /* Limits width so the tall photo doesn't stretch too wide */
    margin: 0 auto;
  }

  .bg-image {
    width: 100%;
    display: block; /* Shows the WHOLE photo from top to bottom */
    height: auto;
  }

  .overlay-content {
    position: absolute;
    top: 15%; /* Positions your text over the blueprint area */
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    background: rgba(0, 0, 0, 0.85); 
    color: white;
    padding: 40px 20px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.9);
  }

  h1 { font-size: 2.2em; text-transform: uppercase; letter-spacing: 3px; margin: 0; border-bottom: 2px solid white; display: inline-block; padding-bottom: 10px; }
  .subtitle { color: #aaa; margin: 15px 0 30px 0; font-size: 1em; }

  .btn-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
  .btn { padding: 12px 25px; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 0.8em; letter-spacing: 1px; transition: 0.3s; }
  .btn-cv { background: white; color: black; }
  .btn-li { background: transparent; color: white; border: 1px solid white; }
  
  .btn:hover { opacity: 0.8; transform: translateY(-2px); }

  .info-text { margin-top: 30px; color: #ddd; font-size: 0.95em; line-height: 1.8; }
  .tag { border: 1px solid #555; padding: 4px 10px; font-size: 0.75em; margin: 3px; display: inline-block; color: #ccc; }
</style>
</head>
<body>

<div class="main-container">
  <img src="download.jpeg" class="bg-image" alt="Engineering Background">

  <div class="overlay-content">
    <h1>Assem Roumieh</h1>
    <p class="subtitle">Automotive Engineering @ PoliTo | IT Operations @ Fincantieri S.p.A.</p>
    
    <div class="btn-container">
      <a href="Assem_Roumieh_CV.pdf" class="btn btn-cv">Download CV</a>
      <a href="https://www.linkedin.com/in/assem-roumieh/" class="btn btn-li">LinkedIn</a>
    </div>

    <div class="info-text">
      <p>Managing digital migration and infrastructure at <b>Fincantieri S.p.A.</b></p>
      <span class="tag">Windows 11 Enterprise</span>
      <span class="tag">Maritime IT</span>
      <span class="tag">Diagnostics</span>
    </div>
  </div>
</div>

<img src="https://profile-counter.glitch.me/assemroumieh/count.svg" alt="Visitor Counter" style="display:none;">

</body>
</html>
