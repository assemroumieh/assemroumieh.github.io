<!DOCTYPE html>
<html lang="en">
<head>
<style>
  /* 1. COMPLETELY KILL BROWSER DEFAULT SPACING */
  * { 
    margin: 0 !important; 
    padding: 0 !important; 
    box-sizing: border-box; 
  }

  html, body {
    width: 100% !important;
    height: 100% !important;
    overflow: hidden !important; /* Locks the screen so it can't move */
    background-color: #000;
  }

  /* 2. THE STRETCH COMMAND */
  .full-page-bg {
    width: 100vw;
    height: 100vh;
    background-image: url('download.jpeg');
    /* '100% 100%' forces it to touch all four corners of the screen */
    background-size: 100% 100%; 
    background-repeat: no-repeat;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .content-box {
    background: rgba(0, 0, 0, 0.85); 
    color: white;
    padding: 60px 40px;
    width: 85%;
    max-width: 800px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 80px rgba(0,0,0,1);
    font-family: 'Segoe UI', Tahoma, sans-serif;
  }

  h1 { font-size: 3.5em; letter-spacing: 4px; text-transform: uppercase; border-bottom: 2px solid white; display: inline-block; padding-bottom: 10px; margin-bottom: 20px !important; }
  .subtitle { color: #aaa; font-size: 1.2em; margin-bottom: 40px !important; }
  
  .btn-wrap { display: flex; justify-content: center; gap: 20px; }
  .btn { padding: 15px 35px; text-decoration: none; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; font-size: 0.9em; border: 1px solid white; }
  .btn-white { background: white; color: black; }
  .btn-outline { background: transparent; color: white; }
</style>
</head>
<body>

<div class="full-page-bg">
  <div class="content-box">
    <h1>Assem Roumieh</h1>
    <p class="subtitle">Automotive Engineering @ PoliTo | IT Operations @ Fincantieri S.p.A.</p>
    
    <div class="btn-wrap">
      <a href="Assem_Roumieh_CV.pdf" class="btn btn-white">Download CV</a>
      <a href="https://www.linkedin.com/in/assem-roumieh/" class="btn btn-outline">LinkedIn</a>
    </div>

    <p style="margin-top: 40px !important; color: #888; font-size: 0.9em; letter-spacing: 1px;">Digital Migration & Infrastructure @ Fincantieri S.p.A.</p>
  </div>
</div>

</body>
</html>
