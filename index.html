<!DOCTYPE html>
<html lang="en">
<head>
<style>
  /* 1. KILL ALL BORDERS AND MARGINS */
  html, body {
    margin: 0 !important;
    padding: 0 !important;
    width: 100% !important;
    height: 100% !important;
    overflow: hidden !important; /* Stops any movement */
    background: #000;
  }

  /* 2. FORCE PHOTO TO TOUCH EVERY CORNER */
  .hero {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-image: url('download.jpeg');
    background-size: 100% 100%; /* STRETCH TO ALL 4 EDGES */
    background-repeat: no-repeat;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .box {
    background: rgba(0, 0, 0, 0.85);
    color: white;
    padding: 50px;
    width: 80%;
    max-width: 700px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
    font-family: sans-serif;
  }

  h1 { font-size: 3em; margin: 0 0 20px 0; border-bottom: 2px solid white; display: inline-block; }
  .btn-container { margin: 30px 0; display: flex; justify-content: center; gap: 20px; }
  .btn { padding: 15px 30px; text-decoration: none; font-weight: bold; border: 1px solid white; color: white; }
  .btn-white { background: white; color: black; }
</style>
</head>
<body>

<div class="hero">
  <div class="box">
    <h1>Assem Roumieh</h1>
    <p>Automotive Engineering @ PoliTo | IT Operations @ Fincantieri S.p.A.</p>
    
    <div class="btn-container">
      <a href="Assem_Roumieh_CV.pdf" class="btn btn-white">Download CV</a>
      <a href="https://www.linkedin.com/in/assem-roumieh/" class="btn">LinkedIn</a>
    </div>

    <p style="color: #888;">Digital Migration & Infrastructure @ Fincantieri S.p.A.</p>
  </div>
</div>

</body>
</html>
