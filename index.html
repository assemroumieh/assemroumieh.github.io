<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* THIS PART KILLS THE BORDERS */
  * { 
    margin: 0 !important; 
    padding: 0 !important; 
    box-sizing: border-box; 
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden; /* This stops the page from moving/scrolling */
    background-color: #000;
  }

  .full-screen-container {
    width: 100vw;
    height: 100vh;
    background-image: url('download.jpeg');
    background-size: 100% 100%; /* Stretches the image to every corner */
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .overlay-card {
    background: rgba(0, 0, 0, 0.85); 
    color: white;
    padding: 50px;
    width: 80%;
    max-width: 750px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 100px rgba(0,0,0,1);
    font-family: 'Segoe UI', sans-serif;
  }

  h1 { font-size: 3em; text-transform: uppercase; letter-spacing: 5px; border-bottom: 2px solid white; display: inline-block; padding-bottom: 10px; margin-bottom: 20px !important; }
  .subtitle { color: #aaa; margin-bottom: 40px !important; font-size: 1.1em; }
  
  .btn-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px !important; }
  .btn { padding: 15px 30px; text-decoration: none; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; font-size: 0.8em; }
  .btn-cv { background: white; color: black; }
  .btn-li { background: transparent; color: white; border: 1px solid white; }
  
  .tags { margin-top: 20px !important; }
  .tag { border: 1px solid #444; padding: 5px 12px; font-size: 0.7em; margin: 5px !important; display: inline-block; color: #888; text-transform: uppercase; }
</style>
</head>
<body>

<div class="full-screen-container">
  <div class="overlay-card">
    <h1>Assem Roumieh</h1>
    <p class="subtitle">Automotive Engineering @ PoliTo | IT Operations @ Fincantieri S.p.A.</p>
    
    <div class="btn-container">
      <a href="Assem_Roumieh_CV.pdf" class="btn btn-cv">Download CV</a>
      <a href="https://www.linkedin.com/in/assem-roumieh/" class="btn btn-li">LinkedIn</a>
    </div>

    <p style="color: #bbb; line-height: 1.6;">Digital Migration & Infrastructure @ <b>Fincantieri S.p.A.</b></p>
    
    <div class="tags">
      <span class="tag">Windows 11</span>
      <span class="tag">Maritime IT</span>
      <span class="tag">Infrastructure</span>
    </div>
  </div>
</div>

</body>
</html>
